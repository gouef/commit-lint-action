name: Commit Lint with [TYPE] prefix and length of message
description: Commit Lint with [TYPE] prefix and length of message
branding:
  icon: check
  color: green

inputs:
  branch:
    required: false
    default: "main"
    description: "Branch"
  prefixes:
    required: true
    default: "Add|Fix|Update|Remove|Refactor|Docs|Test|Improve|Merge|Bump"
    description: "List of all allowed prefix [TYPE] where type can be Add, Fix, use Add|Fix|Update ..."
  minLengthText:
    required: true
    default: 8
    description: "Minimal length after [TYPE] for commit message"

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Lint commit messages
      run: |
        COMMITS=$(git log --pretty=format:"%s" HEAD^..HEAD 2>/dev/null || git log --pretty=format:"%s" HEAD)
        chmod +x .github/scripts/commit-lint.sh

        TEMP_MSG_FILE=$(mktemp)
        
        echo "$COMMITS" | while read -r COMMIT; do
          if [ -z "$COMMIT" ]; then continue; fi
          
          echo "$COMMIT" > "$TEMP_MSG_FILE"
          
          if ! .github/scripts/commit-lint.sh -prefixes "${{ inputs.prefixes }}" -minLength "${{ inputs.minLengthText }}" "$TEMP_MSG_FILE"; then
            rm -f "$TEMP_MSG_FILE"
            exit 1
          fi
        done
        
        rm -f "$TEMP_MSG_FILE"

      shell: bash
    - name: Commit messages are valid
      run: echo "All commit messages are valid!"
      shell: bash